services:
  - type: web
    name: clinica-web
    runtime: docker
    dockerfilePath: ./services/web/Dockerfile
    dockerContext: ./services/web
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://clinica-gateway.onrender.com/api

  - type: web
    name: clinica-gateway
    runtime: docker
    dockerfilePath: ./services/gateway/Dockerfile
    dockerContext: ./services/gateway
    plan: free
    envVars:
      - key: PACIENTES_URL
        value: https://clinica-pacientes.onrender.com
      - key: AGENDAMENTOS_URL
        value: https://clinica-agendamentos.onrender.com
      - key: NOTIFICACOES_URL
        value: https://clinica-notificacoes.onrender.com

  - type: web
    name: clinica-pacientes
    runtime: docker
    dockerfilePath: ./services/pacientes/Dockerfile
    dockerContext: ./services/pacientes
    plan: free

  - type: web
    name: clinica-agendamentos
    runtime: docker
    dockerfilePath: ./services/agendamentos/Dockerfile
    dockerContext: ./services/agendamentos
    plan: free
    envVars:
      - key: PACIENTES_URL
        value: https://clinica-pacientes.onrender.com
      - key: NOTIFICACOES_URL
        value: https://clinica-notificacoes.onrender.com

  - type: web
    name: clinica-notificacoes
    runtime: docker
    dockerfilePath: ./services/notificacoes/Dockerfile
    dockerContext: ./services/notificacoes
    plan: free
    envVars:
      - key: PACIENTES_URL
        value: https://clinica-pacientes.onrender.com
      - key: RESEND_FROM
        value: onboarding@resend.dev
      - key: RESEND_API_KEY
        sync: false
